    <script>
      (function(){
        function clean(v){return String(v||'').replace(/\s+/g,' ').trim();}
        function scrollGallery(){
          setTimeout(function(){
            var galleries=Array.prototype.slice.call(document.querySelectorAll('.gallery-section'));
            var visible=galleries.find(function(el){return el.offsetParent!==null && el.getBoundingClientRect().height>60;});
            if(visible){visible.scrollIntoView({behavior:'smooth',block:'start'});}
          },700);
        }
        function openByTitle(title){
          title=clean(title);
          if(!title)return;
          var cards=Array.prototype.slice.call(document.querySelectorAll('.project-card'));
          var card=cards.find(function(c){
            var t=clean((c.querySelector('h3')||{}).textContent);
            return t===title || t.indexOf(title)>-1 || title.indexOf(t)>-1;
          });
          if(card){
            var btn=card.querySelector('button');
            if(btn){btn.click();}
            scrollGallery();
          }
        }
        document.addEventListener('click',function(e){
          var slider=e.target.closest('.slider');
          if(slider && !e.target.closest('.slide-actions')){
            openByTitle((slider.querySelector('h3')||{}).textContent);
          }
          if(e.target.closest('.project-card button')){scrollGallery();}
        },true);
      })();
    </script>
